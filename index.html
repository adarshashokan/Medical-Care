<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediCare - Medical Consultation & Doctor Finder</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

```
<!-- Navigation -->
<nav class="navbar">
    <div class="container">
        <div class="logo">🏥 MediCare</div>
        <ul class="nav-menu">
            <li><a href="#" onclick="showSection('consultation')">Consultation</a></li>
            <li><a href="#" onclick="showSection('reminders')">Medicine Reminders</a></li>
            <li><a href="#" onclick="showSection('history')">My Appointments</a></li>
        </ul>
    </div>
</nav>

<!-- Consultation Section -->
<section id="consultation" class="section active">
    <div class="container">
        <h1>Get Medical Consultation</h1>
        <p class="subtitle">Tell us about your symptoms and find the perfect doctor near you</p>

        <div class="form-container">
            <form id="consultationForm" class="consultation-form">

                <div class="form-group">
                    <label>Full Name *</label>
                    <input type="text" id="fullName" required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Age *</label>
                        <input type="number" id="age" required>
                    </div>

                    <div class="form-group">
                        <label>Gender *</label>
                        <select id="gender" required>
                            <option value="">Select Gender</option>
                            <option>Male</option>
                            <option>Female</option>
                            <option>Other</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label>Location *</label>
                    <input type="text" id="location" placeholder="Mumbai, New York..." required>
                </div>

                <div class="form-group">
                    <label>Symptoms *</label>
                    <textarea id="symptoms" rows="4" required></textarea>
                </div>

                <div class="form-group">
                    <label>Duration *</label>
                    <select id="duration" required>
                        <option value="">Select Duration</option>
                        <option>1 day</option>
                        <option>2-3 days</option>
                        <option>1 week</option>
                        <option>More than 1 week</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Medications</label>
                    <textarea id="medications" rows="2"></textarea>
                </div>

                <button type="submit" class="btn btn-primary">Get Recommendation</button>
            </form>
        </div>

        <!-- Results -->
        <div id="resultsSection" class="results-section hidden">
            <h2>Recommended Doctors</h2>
            <div id="departmentCard" class="department-card">
                <h3><span id="departmentName"></span></h3>
                <p id="departmentDescription"></p>
            </div>
            <div id="doctorsList"></div>
            <div id="appointmentForm" class="hidden"></div>
        </div>
    </div>
</section>

<!-- Reminders Section -->
<section id="reminders" class="section">
    <div class="container">
        <h1>Medicine Reminders</h1>

        <form id="reminderForm">
            <input type="text" id="medicineName" placeholder="Medicine Name" required>
            <input type="text" id="dosage" placeholder="Dosage" required>
            <input type="time" id="reminderTime" required>
            <input type="date" id="startDate" required>
            <button type="submit">Add Reminder</button>
        </form>

        <div id="remindersContainer"></div>
    </div>
</section>

<!-- History Section -->
<section id="history" class="section">
    <div class="container">
        <h1>Appointments</h1>
        <div id="appointmentsContainer"></div>
    </div>
</section>

<!-- Footer -->
<footer class="footer">
    <div class="container">
        <p>© 2025 MediCare. All rights reserved.</p>
    </div>
</footer>

<!-- 🔥 IMPORTANT: JavaScript Files -->
<script src="js/data.js"></script>
<script src="js/symptomMatcher.js"></script>
<script src="js/reminder.js"></script>
<script src="js/app.js"></script>
```

</body>
</html>
